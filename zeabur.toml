# ═══════════════════════════════════════════════════════════════
# 今心 ImXin — Zeabur 多服務部署配置
# 
# Zeabur 使用服務級別的 zeabur.toml，每個服務目錄一份配置。
# 本文件對應前端 PWA 服務（根目錄）。
# Bot 後端服務配置請見 server/zeabur.toml。
# ═══════════════════════════════════════════════════════════════

[build]
publish_dir = "dist"

[serves]
index = "index.html"
history_api_fallback = true

[env]
NODE_ENV = "production"
VITE_ZEABUR_URL = "${ZEABUR_WEB_URL}"
