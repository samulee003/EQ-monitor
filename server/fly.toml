# ═══════════════════════════════════════════════════════════════
# 今心 ImXin Bot Server — Fly.io 部署配置
# 
# 使用方式：
#   cd server/
#   fly launch --name imxin-bot-server --region hkg
#   fly deploy
# ═══════════════════════════════════════════════════════════════

app = 'imxin-bot-server'
primary_region = 'hkg'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    grace_period = '10s'
    interval = '30s'
    method = 'GET'
    timeout = '5s'
    path = '/health'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
